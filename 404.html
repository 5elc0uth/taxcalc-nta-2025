<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — TaxCalc NTA 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0F0D;
      color: #E8F0EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border: 2.5px solid #00A86B;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00A86B;
      font-weight: 800;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: #E8F0EB;
      letter-spacing: -0.5px;
    }

    .logo-badge {
      font-size: 10px;
      font-weight: 500;
      color: #00A86B;
      margin-left: 4px;
    }

    .error-code {
      font-size: 96px;
      font-weight: 800;
      color: #00A86B;
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 16px;
      opacity: 0.15;
    }

    .error-title {
      font-size: 24px;
      font-weight: 700;
      color: #E8F0EB;
      margin-bottom: 12px;
    }

    .error-sub {
      font-size: 15px;
      color: rgba(232, 240, 235, 0.5);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #00A86B;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-home:hover {
      background: #008f5a;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #00A86B;
      border-radius: 2px;
      margin: 0 auto 32px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">
      <div class="logo-icon">₦</div>
      <span class="logo-text">TaxCalc <span class="logo-badge">NTA 2025</span></span>
    </a>

    <div class="error-code">404</div>
    <div class="divider"></div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-sub">
      The page you're looking for doesn't exist or has been moved.<br />
      Let's get you back to calculating your taxes.
    </p>
    <a href="/" class="btn-home">← Back to TaxCalc</a>
  </div>
</body>
</html>
